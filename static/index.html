<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c5f8a">
    <title>WhatsYes - לוח שידורים</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#f5f0e8;--card-bg:#fff;--primary:#2c5f8a;--primary-light:#3a7bb8;
            --accent:#e8a030;--text:#2a2a2a;--text-light:#5a5a5a;--border:#d0c8b8;
            --now-bg:#e8f5e9;--now-border:#4caf50;--fav:#e8a030;
            --shadow:0 2px 8px rgba(0,0,0,.1);--safe-bottom:env(safe-area-inset-bottom,0px);
        }
        html{font-size:20px;-webkit-text-size-adjust:100%}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,Arial,sans-serif;
            background:var(--bg);color:var(--text);line-height:1.6;
            min-height:100vh;min-height:100dvh;
            -webkit-font-smoothing:antialiased;overflow-x:hidden;
        }

        /* ── Header ────────────────────────────────────── */
        header{
            background:var(--primary);color:#fff;padding:.8rem 1rem;text-align:center;
            box-shadow:0 2px 12px rgba(0,0,0,.15);position:sticky;top:0;z-index:100;
        }
        header h1{font-size:1.6rem;font-weight:700}
        header p{font-size:.9rem;opacity:.9;margin-top:.1rem}

        .container{max-width:900px;margin:0 auto;padding:.8rem;padding-bottom:calc(.8rem + var(--safe-bottom))}

        /* ── Date row ──────────────────────────────────── */
        .date-section{
            display:flex;gap:.4rem;margin:.8rem 0;overflow-x:auto;
            -webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;
            scrollbar-width:none;padding:.2rem 0;
        }
        .date-section::-webkit-scrollbar{display:none}
        .date-btn{
            background:var(--card-bg);border:2px solid var(--border);border-radius:12px;
            padding:.5rem .8rem;font-size:1rem;font-weight:600;cursor:pointer;color:var(--text);
            white-space:nowrap;flex-shrink:0;scroll-snap-align:start;
            -webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .2s;
        }
        .date-btn:hover,.date-btn:focus{border-color:var(--primary);background:#e8f0f8;outline:none}
        .date-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

        .section-title{
            font-size:1.2rem;font-weight:700;margin:1rem 0 .5rem;color:var(--primary);
            border-bottom:3px solid var(--accent);padding-bottom:.2rem;display:inline-block;
        }

        /* ── Category tabs ─────────────────────────────── */
        .category-tabs{
            display:flex;gap:.3rem;margin-bottom:.5rem;overflow-x:auto;
            -webkit-overflow-scrolling:touch;scrollbar-width:none;padding:.2rem 0;
        }
        .category-tabs::-webkit-scrollbar{display:none}
        .cat-tab{
            background:var(--card-bg);border:2px solid var(--border);border-radius:20px;
            padding:.35rem .8rem;font-size:.9rem;font-weight:600;cursor:pointer;white-space:nowrap;
            flex-shrink:0;color:var(--text);-webkit-tap-highlight-color:transparent;
            touch-action:manipulation;transition:all .2s;
        }
        .cat-tab:hover,.cat-tab:focus{border-color:var(--primary);outline:none}
        .cat-tab.active{background:var(--accent);color:#2a2a2a;border-color:var(--accent);font-weight:700}

        /* ── Favorites ─────────────────────────────────── */
        .fav-section{margin-bottom:.6rem}
        .fav-header{display:flex;align-items:center;gap:.4rem;margin-bottom:.4rem}
        .fav-header span{font-size:1.1rem;font-weight:700;color:var(--fav)}

        /* ── Channel grid ──────────────────────────────── */
        .channel-grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
            gap:.5rem;margin-bottom:1rem;
        }
        .channel-btn{
            background:var(--card-bg);border:3px solid var(--border);border-radius:14px;
            padding:.55rem .3rem;font-size:1.05rem;font-weight:700;cursor:pointer;
            text-align:center;color:var(--text);-webkit-tap-highlight-color:transparent;
            touch-action:manipulation;min-height:48px;display:flex;align-items:center;
            justify-content:center;position:relative;transition:all .15s;gap:.3rem;
        }
        .channel-btn:hover,.channel-btn:focus{border-color:var(--primary);background:#e8f0f8;outline:none}
        .channel-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--shadow)}

        /* Star icon */
        .star-icon{
            font-size:.85rem;cursor:pointer;flex-shrink:0;line-height:1;
            transition:transform .2s;user-select:none;-webkit-user-select:none;
        }
        .star-icon:hover{transform:scale(1.3)}
        .star-icon.filled{color:var(--fav)}
        .star-icon.empty{color:var(--border)}

        /* ── Schedule area ─────────────────────────────── */
        .schedule-area{min-height:150px}
        .loading{text-align:center;padding:2.5rem 1rem;font-size:1.2rem;color:var(--text-light)}
        .loading::after{
            content:'';display:inline-block;width:1rem;height:1rem;
            border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;
            animation:spin .8s linear infinite;margin-right:.5rem;vertical-align:middle;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty-state{text-align:center;padding:2.5rem 1rem;font-size:1.15rem;color:var(--text-light)}

        /* ── Program card ──────────────────────────────── */
        .program-card{
            background:var(--card-bg);border:2px solid var(--border);border-radius:16px;
            padding:.8rem;margin-bottom:.6rem;box-shadow:var(--shadow);display:flex;gap:.8rem;
            align-items:flex-start;cursor:pointer;-webkit-tap-highlight-color:transparent;
            transition:border-color .2s;
        }
        .program-card:hover{border-color:var(--primary-light)}
        .program-card.on-now{border-color:var(--now-border);border-width:3px;background:var(--now-bg)}
        .program-image{flex-shrink:0;width:100px;height:72px;object-fit:cover;border-radius:10px;background:var(--border)}
        .program-info{flex:1;min-width:0}
        .program-time{font-size:1.3rem;font-weight:800;color:var(--primary);direction:ltr;display:inline-block}
        .now-badge{
            display:none;background:var(--now-border);color:#fff;font-size:.8rem;font-weight:700;
            padding:.1rem .5rem;border-radius:8px;margin-right:.4rem;vertical-align:middle;
            animation:pulse 2s ease-in-out infinite;
        }
        .program-card.on-now .now-badge{display:inline-block}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
        .program-title{
            font-size:1.15rem;font-weight:700;margin-top:.15rem;line-height:1.4;
            word-wrap:break-word;overflow-wrap:break-word;
        }
        .program-desc{font-size:.9rem;color:var(--text-light);margin-top:.25rem;line-height:1.5;display:none}
        .program-card.expanded .program-desc{display:block}
        .program-card.expanded .expand-hint{display:none}
        .expand-hint{font-size:.8rem;color:var(--primary-light);margin-top:.15rem}

        footer{
            text-align:center;padding:1.2rem .5rem;
            padding-bottom:calc(1.2rem + var(--safe-bottom));
            color:var(--text-light);font-size:.8rem;
        }
        :focus-visible{outline:3px solid var(--accent);outline-offset:2px}
        .error-banner{
            background:#fdecea;border:2px solid #e57373;border-radius:12px;padding:.8rem;
            text-align:center;font-size:1rem;color:#c62828;margin-bottom:.8rem;
        }

        /* ═══ Mobile ═══ */
        @media(max-width:600px){
            html{font-size:17px}
            header{padding:.6rem .8rem}
            header h1{font-size:1.4rem}
            .container{padding:.5rem}
            .channel-grid{grid-template-columns:repeat(3,1fr);gap:.4rem}
            .channel-btn{padding:.5rem .25rem;font-size:.88rem;border-radius:10px;border-width:2px}
            .program-card{flex-direction:column;padding:.7rem}
            .program-image{width:100%;height:140px;border-radius:8px}
            .program-time{font-size:1.2rem}
            .program-title{font-size:1.05rem}
        }
        @media(max-width:380px){
            html{font-size:15px}
            .channel-grid{grid-template-columns:repeat(2,1fr)}
            .channel-btn{font-size:.85rem}
        }
        @media(min-width:601px) and (max-width:900px){
            .channel-grid{grid-template-columns:repeat(4,1fr)}
        }
    </style>
</head>
<body>
    <header>
        <h1>📺 WhatsYes</h1>
        <p>לוח השידורים של yes — בפשטות</p>
    </header>

    <div class="container">
        <!-- Date picker -->
        <div class="date-section" id="date-section" role="navigation" aria-label="בחירת תאריך"></div>

        <div class="section-title">בחרי ערוץ:</div>

        <!-- Category filter -->
        <div class="category-tabs" id="category-tabs" role="tablist" aria-label="קטגוריות"></div>

        <!-- Favorites section -->
        <div class="fav-section" id="fav-section" style="display:none">
            <div class="fav-header"><span>⭐ מועדפים</span></div>
            <div class="channel-grid" id="fav-grid"></div>
        </div>

        <!-- All channels -->
        <div class="channel-grid" id="channel-grid" role="navigation" aria-label="בחירת ערוץ"></div>

        <!-- Schedule -->
        <div class="schedule-area" id="schedule-area">
            <div class="empty-state">👆 בחרי ערוץ כדי לראות את לוח השידורים</div>
        </div>
    </div>

    <footer>WhatsYes &middot; לוח שידורים נגיש עבור סבתא 💛</footer>

    <script>
    (function () {
        'use strict';

        /* ── State ────────────────────────────────────── */
        var channels = [];
        var selectedChannel = null;
        var selectedDate = null;
        var selectedCategory = 'all';

        /* ── Favorites (localStorage) ─────────────────── */
        var FAV_KEY = 'whatsyes_favorites';

        function getFavs() {
            try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; }
            catch (e) { return []; }
        }
        function saveFavs(arr) {
            try { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); } catch (e) { /* private browsing */ }
        }
        function isFav(id) { return getFavs().indexOf(id) !== -1; }
        function toggleFav(id) {
            var favs = getFavs();
            var idx = favs.indexOf(id);
            if (idx === -1) favs.push(id);
            else favs.splice(idx, 1);
            saveFavs(favs);
        }

        /* ── Categories ───────────────────────────────── */
        var CATEGORIES = {
            'all': 'הכל',
            'סרטים': 'סרטים',
            'חדשות': 'חדשות',
            'ילדים': 'ילדים',
            'ספורט': 'ספורט',
            'דרמה': 'דרמה',
            'בידור': 'בידור',
            'תרבות': 'תרבות',
            'מוזיקה': 'מוזיקה',
            'אחר': 'אחר'
        };

        function guessCategory(name) {
            var n = name;
            if (/סרטים|וסטרן/.test(n)) return 'סרטים';
            if (/חדשות|כאן 11|אקטואליה|i24|בעיר|ישראל הבוקר/.test(n)) return 'חדשות';
            if (/ילדים|הופ|לולי|בייבי|קטרים|דיסני|ניק|ניקלודיאון/.test(n)) return 'ילדים';
            if (/ספורט|ONE|גולד|פרמייר|כדורגל|רכיבה/.test(n)) return 'ספורט';
            if (/דרמה|אקשן|לב|טורקי|טלנובלה|לטינו|בגידה|לוונדר|צרפתית/.test(n)) return 'דרמה';
            if (/קומדי|ריאליטי|קשת|רשת|לייף|האח הגדול|קוקוריקו/.test(n)) return 'בידור';
            if (/תרבות|אוכל|DIY|בית|אופנה|בוליווד|קלאסיק|דוקו|רדיו|עיצוב|נסיעות|כושר|יוגה|רכבים|היסטוריה/.test(n)) return 'תרבות';
            if (/מוזיקה|MTV/.test(n)) return 'מוזיקה';
            return 'אחר';
        }

        /* ── Date helpers ─────────────────────────────── */
        function israelDate(off) {
            var d = new Date();
            d.setDate(d.getDate() + (off || 0));
            return d;
        }
        function fmtDP(d) {
            return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
        }
        function hebDay(d) {
            return ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'][d.getDay()];
        }
        function fmtDD(d) {
            return hebDay(d) + ' ' + d.getDate() + '/' + (d.getMonth() + 1);
        }

        /* ── Date buttons ─────────────────────────────── */
        function initDates() {
            var c = document.getElementById('date-section');
            var labels = ['היום', 'מחר'];
            for (var i = 0; i < 7; i++) {
                var d = israelDate(i);
                var b = document.createElement('button');
                b.className = 'date-btn' + (i === 0 ? ' active' : '');
                b.textContent = i < 2 ? labels[i] + ' (' + fmtDD(d) + ')' : fmtDD(d);
                b.dataset.date = fmtDP(d);
                b.addEventListener('click', onDateClick);
                c.appendChild(b);
            }
            selectedDate = fmtDP(israelDate(0));
        }

        function onDateClick(e) {
            document.querySelectorAll('.date-btn').forEach(function (b) { b.classList.remove('active'); });
            e.currentTarget.classList.add('active');
            selectedDate = e.currentTarget.dataset.date;
            if (selectedChannel) loadSchedule(selectedChannel, selectedDate);
        }

        /* ── Category tabs ────────────────────────────── */
        function renderCatTabs() {
            var c = document.getElementById('category-tabs');
            c.innerHTML = '';
            Object.keys(CATEGORIES).forEach(function (key) {
                var b = document.createElement('button');
                b.className = 'cat-tab' + (key === selectedCategory ? ' active' : '');
                b.textContent = CATEGORIES[key];
                b.dataset.cat = key;
                b.addEventListener('click', function () {
                    selectedCategory = key;
                    document.querySelectorAll('.cat-tab').forEach(function (t) { t.classList.remove('active'); });
                    b.classList.add('active');
                    renderChannels();
                });
                c.appendChild(b);
            });
        }

        /* ── Channels ─────────────────────────────────── */
        function loadChannels() {
            fetch('/api/channels')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    channels = data.map(function (ch) {
                        ch.category = guessCategory(ch.name);
                        return ch;
                    });
                    renderCatTabs();
                    renderChannels();
                })
                .catch(function (e) { console.error('channels load failed', e); });
        }

        function makeChannelBtn(ch) {
            var btn = document.createElement('button');
            btn.className = 'channel-btn' + (ch.id === selectedChannel ? ' active' : '');
            btn.dataset.id = ch.id;
            btn.setAttribute('aria-label', 'ערוץ ' + ch.name);

            // Star toggle
            var star = document.createElement('span');
            star.className = 'star-icon ' + (isFav(ch.id) ? 'filled' : 'empty');
            star.textContent = isFav(ch.id) ? '\u2605' : '\u2606';
            star.setAttribute('aria-label', isFav(ch.id) ? 'הסירי ממועדפים' : 'הוסיפי למועדפים');
            star.addEventListener('click', function (e) {
                e.stopPropagation();
                toggleFav(ch.id);
                renderChannels();
            });

            var label = document.createElement('span');
            label.textContent = ch.name;

            btn.appendChild(star);
            btn.appendChild(label);
            btn.addEventListener('click', function () { selectChannel(ch.id, btn); });
            return btn;
        }

        function renderChannels() {
            var favGrid = document.getElementById('fav-grid');
            var grid = document.getElementById('channel-grid');
            var favSection = document.getElementById('fav-section');
            favGrid.innerHTML = '';
            grid.innerHTML = '';

            var favIds = getFavs();

            // Apply category filter
            var filtered = selectedCategory === 'all'
                ? channels
                : channels.filter(function (ch) { return ch.category === selectedCategory; });

            // Separate favorites vs rest
            var favChannels = [];
            var restChannels = [];
            filtered.forEach(function (ch) {
                if (favIds.indexOf(ch.id) !== -1) favChannels.push(ch);
                else restChannels.push(ch);
            });

            // Render favorites section
            if (favChannels.length > 0) {
                favSection.style.display = '';
                favChannels.forEach(function (ch) { favGrid.appendChild(makeChannelBtn(ch)); });
            } else {
                favSection.style.display = 'none';
            }

            // Render rest
            restChannels.forEach(function (ch) { grid.appendChild(makeChannelBtn(ch)); });
        }

        function selectChannel(id, btn) {
            document.querySelectorAll('.channel-btn').forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');
            selectedChannel = id;
            loadSchedule(id, selectedDate);
        }

        /* ── Schedule ─────────────────────────────────── */
        function loadSchedule(chId, date) {
            var area = document.getElementById('schedule-area');
            area.innerHTML = '<div class="loading">טוען לוח שידורים…</div>';
            fetch('/api/schedule/' + chId + '?date=' + date)
                .then(function (r) { return r.json(); })
                .then(function (data) { renderSchedule(data); })
                .catch(function () {
                    area.innerHTML = '<div class="error-banner">לא הצלחנו לטעון את לוח השידורים. נסי שוב.</div>';
                });
        }

        function renderSchedule(data) {
            var area = document.getElementById('schedule-area');
            if (!data.programs || !data.programs.length) {
                area.innerHTML = '<div class="empty-state">אין שידורים זמינים לתאריך הזה</div>';
                return;
            }
            var nowISO = new Date().toISOString();
            var h = '<div class="section-title">' + data.channel_name + ' \u2014 ' + data.date + '</div>';
            data.programs.forEach(function (p) {
                var isNow = p.starts <= nowISO && nowISO <= p.ends;
                h += '<div class="program-card ' + (isNow ? 'on-now' : '') + '" tabindex="0">';
                if (p.image) {
                    h += '<img class="program-image" src="' + p.image + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
                }
                h += '<div class="program-info">';
                h += '<span class="program-time">' + p.start_time + ' \u2013 ' + p.end_time + '</span>';
                h += '<span class="now-badge">\u05E2\u05DB\u05E9\u05D9\u05D5 \u05D1\u05E9\u05D9\u05D3\u05D5\u05E8</span>';
                h += '<div class="program-title">' + p.title + '</div>';
                if (p.description) {
                    h += '<div class="expand-hint">\u05DC\u05D7\u05E6\u05D9 \u05DC\u05E4\u05E8\u05D8\u05D9\u05DD \u05E0\u05D5\u05E1\u05E4\u05D9\u05DD \u25BC</div>';
                    h += '<div class="program-desc">' + p.description + '</div>';
                }
                h += '</div></div>';
            });
            area.innerHTML = h;

            // Expand on click
            area.querySelectorAll('.program-card').forEach(function (c) {
                c.addEventListener('click', function () { c.classList.toggle('expanded'); });
            });

            // Scroll to "on now"
            var now = area.querySelector('.on-now');
            if (now) setTimeout(function () { now.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
        }

        // Keyboard accessibility
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && e.target.classList.contains('program-card')) {
                e.target.classList.toggle('expanded');
            }
        });

        /* ── Boot ─────────────────────────────────────── */
        initDates();
        loadChannels();
    })();
    </script>
</body>
</html>
